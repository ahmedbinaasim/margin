name: Keep Render service warm

on:
  schedule:
    # Every 10 minutes. GitHub Actions cron is best-effort and may delay by a few minutes
    # under load, but is reliable enough to keep a 15-minute-sleep service awake.
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Ping healthz
        run: |
          set -euo pipefail
          for i in 1 2 3; do
            if curl -fsS --max-time 60 "https://api.margin.dev/healthz" > /dev/null; then
              echo "Ping $i OK"
              exit 0
            fi
            echo "Ping $i failed, retrying in 10s..."
            sleep 10
          done
          echo "All 3 pings failed; service may be down."
          exit 1
