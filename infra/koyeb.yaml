# Koyeb service spec. Apply with `koyeb app create margin-api --file infra/koyeb.yaml`.
name: margin-api
type: web
region: fra        # change to was, sin, etc. depending on user latency
instance:
  type: free       # 1 free instance per account; scales to zero after 1h idle
ports:
  - port: 8080
    protocol: http
routes:
  - path: /
    port: 8080
healthcheck:
  http:
    path: /healthz
    port: 8080
  interval: 30s
  grace_period: 30s
  timeout: 5s
  failure_threshold: 3
build:
  type: dockerfile
  dockerfile: apps/api/Dockerfile
  context: apps/api
env:
  - name: PUBLIC_BASE_URL
    value: https://margin.dev
  - name: API_BASE_URL
    value: https://api.margin.dev
secrets:
  - name: DATABASE_URL          # Neon connection string
  - name: JWT_SECRET
  - name: VOYAGE_API_KEY
  - name: GROQ_API_KEY
  - name: R2_ACCOUNT_ID
  - name: R2_ACCESS_KEY_ID
  - name: R2_SECRET_ACCESS_KEY
  - name: R2_BUCKET
  - name: R2_ENDPOINT
  - name: RESEND_API_KEY        # optional
