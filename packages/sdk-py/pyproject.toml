[project]
name = "margin"
version = "0.1.0"
description = "Margin: agent-native research workspace — Python SDK"
readme = "README.md"
requires-python = ">=3.10"
license = { text = "MIT" }
dependencies = [
    "httpx>=0.27",
    "pydantic>=2",
]

[project.optional-dependencies]
dev = ["pytest>=8", "respx>=0.22"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/margin"]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-q"
